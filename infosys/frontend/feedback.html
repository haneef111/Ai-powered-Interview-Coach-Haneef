<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - AI Interview Coach</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo"><a href="dashboard.html">AI Interview Coach</a></h1>
        </div>
    </nav>

    <div class="feedback-container">
        <div class="container">
            <h2>Interview Feedback</h2>
            
            <div class="overall-score">
                <h3>Overall Score</h3>
                <div class="score-circle">
                    <span id="overall-score">--</span>
                </div>
            </div>

            <div class="feedback-sections">
                <div class="feedback-card">
                    <h3>🎤 Speech Analysis</h3>
                    <div id="speech-feedback">
                        <p>Loading...</p>
                    </div>
                </div>

                <div class="feedback-card">
                    <h3>😊 Confidence & Body Language</h3>
                    <div id="facial-feedback">
                        <p>Loading...</p>
                    </div>
                </div>

                <div class="feedback-card">
                    <h3>📝 Content Quality</h3>
                    <div id="content-feedback">
                        <p>Loading...</p>
                    </div>
                </div>
            </div>

            <div class="actions">
                <a href="interview.html" class="btn-primary">Try Another Interview</a>
                <a href="dashboard.html" class="btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="js/feedback.js"></script>
</body>
</html>
